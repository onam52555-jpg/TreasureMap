<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보물지도 🗺️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f5e1 0%, #f3eeff 50%, #e8f5e1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }

    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #a8d5a2;
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a8d5a2, #c3a8e0);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }

    .error-msg {
      color: #e57373;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🗺️</div>
    <h1>보물지도</h1>
    <p class="subtitle">우리만의 특별한 장소들</p>

    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요" />
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">로그인</button>
    <p class="error-msg" id="errorMsg">이메일 또는 비밀번호를 확인해주세요.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // 이미 로그인되어 있으면 메인으로
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errMsg.textContent = '이메일과 비밀번호를 모두 입력해주세요.';
        errMsg.style.display = 'block';
        return;
      }

      btn.textContent = '로그인 중...';
      btn.classList.add('loading');
      errMsg.style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errMsg.textContent = '이메일 또는 비밀번호를 확인해주세요.';
        errMsg.style.display = 'block';
        btn.textContent = '로그인';
        btn.classList.remove('loading');
      } else {
        // 저장된 리다이렉트 URL이 있으면 그쪽으로, 없으면 index.html로
        const savedUrl = sessionStorage.getItem('redirectAfterLogin');
        if (savedUrl) {
          window.location.href = savedUrl;
        } else {
          window.location.href = 'index.html';
        }
      }
    }

    // 엔터키로 로그인
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
